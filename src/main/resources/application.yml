spring:
  application:
    name: owasp-playground

  # Load .env for local development. The file is optional so CI/CD and production
  # environments that supply secrets via real environment variables are unaffected.
  # Secrets in environment variables always take precedence over .env values.
  config:
    import: optional:file:.env[.properties]

  # Default to the dev profile so the app starts without -Dspring-boot.run.profiles.
  # Production deployments must set SPRING_PROFILES_ACTIVE=prod explicitly.
  profiles:
    default: dev

  datasource:
    # Reuses the same variable names as docker-compose.yml — one .env file serves both.
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:owasp_playground}
    username: ${POSTGRES_USER:owasp_user}
    password: ${POSTGRES_PASSWORD}            # required — no insecure default
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Query timeout (A10) — prevents slow or malicious queries from holding DB connections
        # indefinitely and exhausting the connection pool (fail-closed resource control).
        # Value is in milliseconds; 5 s is generous for a simple OLTP API.
        # Limitation: hint-based — not all JDBC drivers honour it; PostgreSQL does via
        # socketTimeout but this is an application-level safeguard, not a replacement for
        # statement_timeout at the DB level.
        jakarta:
          persistence:
            query:
              timeout: 5000
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}             # required — no insecure default
      timeout: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

security:
  cors:
    # Override via CORS_ALLOWED_ORIGINS env var in production.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  brute-force:
    max-attempts: 5
    lockout-duration: PT15M
  rate-limit:
    requests-per-window: 100
    window-duration: PT1M
    # Set to true only when running behind a trusted reverse proxy (nginx, ALB) that
    # reliably overwrites X-Forwarded-For. When false (default), the socket-level
    # remote address is used — not spoofable by clients.
    trust-forwarded-for: false
  jwt:
    secret: ${JWT_SECRET}                     # required — no insecure default
    expiry: PT15M
