spring:
  application:
    name: owasp-playground

  datasource:
    url: jdbc:postgresql://localhost:5432/owasp_playground
    username: owasp_user
    password: change_me_postgres_123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password: change_me_redis_123
      timeout: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

security:
  cors:
    # Comma-separated — required for @Value injection into List<String>
    allowed-origins: "http://localhost:3000,http://localhost:5173"